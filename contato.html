    <script

    ></script>

  <body onload="loadPreviousMode(), revelationsContato()">
    <div id="fundo"></div>
    <header>
      <a href="./index.html" id="nomeSite"

    <div id="corpo">

      <div id="form">
        <div id="caixaComentario"></div>
        <textarea

          id="comentario"
          cols="60"
          rows="5"
        ></textarea>
        <br />
        <button id="botaoEnvio" onclick="sendComment()">Enviar</button>
      </div>
    </div>

    <div id="rodape">

          ><ion-icon name="logo-github"></ion-icon

        <a href="https://instagram.com/arthurcrodri" target="_blank"

        ></a>
        <a href="https://linkedin.com/in/arthurcrodri" target="_blank"
          ><ion-icon name="logo-linkedin"></ion-icon
        ></a>
        <a href="https://youtube.com/@arthurcrodri" target="_blank"

        ></a>
        <a href="mailto:arthur.sbt@yahoo.com"
